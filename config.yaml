name: "Hetzner IP Updater"
version: "2.0.3"
slug: hetzner_ip_updater
description: "Updates your public IP address on Hetzner DNS Console"
startup: "once"
boot: "manual"
host_network: true
init: false
data: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  hetzner_cloud_token: "YOUR_HETZNER_Console_API_TOKEN"
  zone_name: "example.com"
  record_name: "home.example.com"
  record_type: "A"
schema:
  hetzner_cloud_token: str
  zone_name: str
  record_name: str
  record_type: list(A|AAAA|Both)
